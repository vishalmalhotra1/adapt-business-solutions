name: Daily Blog Generation

on:
  schedule:
    # Runs at 1:00 PM UTC = 8:00 AM EST (winter) / 9:00 AM EDT (summer)
    - cron: '0 13 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab
    inputs:
      debug:
        description: 'Run in debug mode (dry run)'
        required: false
        default: 'false'

jobs:
  generate-blog-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install project dependencies
        run: npm ci

      - name: Install Anthropic SDK (script-only)
        run: npm install @anthropic-ai/sdk --no-save

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-blog.mjs

      - name: Check for new files
        id: check_changes
        run: |
          git add .
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push new blog post
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.email "auto-blog@adaptbusinesssolutions.com"
          git config user.name "Adapt Blog Bot"
          git commit -m "Auto-generate daily CPA blog post [$(date +%Y-%m-%d)]

          Generated by daily-blog.yml workflow using Claude AI.
          Includes SEO metadata, Article JSON-LD schema, and professional disclaimer.

          [skip ci]"
          git push origin main

      - name: No changes to commit
        if: steps.check_changes.outputs.changed == 'false'
        run: echo "No new blog post was generated (no changes detected)."
